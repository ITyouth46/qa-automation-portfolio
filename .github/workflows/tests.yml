name: Automated QA Tests

# Когда запускать тесты? При каждом push в ветку master
on:
  push:
    branches: [ "master" ]

# Что именно делать?
jobs:
  run-all-tests:
    runs-on: ubuntu-latest # Поднимаем виртуальный сервер на Linux

    steps:
      # Шаг 1: Скачиваем код из репозитория
      - name: Checkout repository
        uses: actions/checkout@v4

      # Шаг 2: Устанавливаем Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Шаг 3: Устанавливаем библиотеки (PyTest, Playwright, Requests)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest playwright pytest-playwright requests
          
      # Шаг 4: Устанавливаем системные браузеры для Playwright
      - name: Install Playwright Browsers
        run: playwright install chromium

      # Шаг 5: Запускаем тесты 
      - name: Run PyTest
        run: pytest